<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ejercicio Grid</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container">
      <div class="logo">
        <img src="img/logo-DM.png" alt="Logo DM" />
      </div>

      <h3>🤯 Rompecabezas!</h3>

      <div class="exercice">
        <div class="exercice-complete">
          <img src="img/final.jpg" alt="Rompecabezas completo" />
        </div>

        <div class="excercice-incomplete">
          <div class="grid-one">
            <img src="img/2.jpg" alt="Imagen 2" />
          </div>

          <div class="grid-two">
            <img src="img/3.jpg" alt="Imagen 3" />
          </div>

          <div class="grid-three">
            <img src="img/4.jpg" alt="Imagen 4" />
          </div>

          <div class="grid-four">
            <img src="img/1.jpg" alt="Imagen 1" />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
